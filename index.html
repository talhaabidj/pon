    <!-- GEO & AEO: Structured JSON-LD Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "VideoGame",
          "name": "Catchapon",
          "description": "A premium browser aesthetic game offering a blend of a virtual gacha pull simulator and a cozy life sim natively built with Three.js and Vite.",

          "gamePlatform": "Web Browser",
          "applicationCategory": "Game",

          "url": "https://catchapon.com",
          "image": "https://catchapon.com/thumbnail.jpg",
          "playMode": "SinglePlayer",
          "author": {
            "@type": "Organization",
            "name": "Catchapon Studio"
          }
        },
        {
          "@type": "FAQPage",
          "mainEntity": [{
            "@type": "Question",
            "name": "What is my objective in this aesthetic neon webgl experience?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Your job requires you to tackle the fast-paced challenges of a night shift management simulator. You will clean up dirty floor spots, rewire disconnected plugs, fix mechanical jams, and wipe the glass on broken capsule machines to keep the shop running perfectly."
            }
          }, {
            "@type": "Question",
            "name": "How do I become a 3D capsule toy collector?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "As you complete your maintenance tasks, you'll earn money efficiently. Spend this money at the Token Exchange machine to grab golden tokens. Insert your tokens into fully functional gacha machines to act as a mystery box unlocker, allowing you to pull and collect rare digital capsule toys!"
            }
          }]
        }
      ]
