<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catchapon — Night Shift Gacha</title>
    <meta
      name="description"
      content="Catchapon is an aesthetic neon webgl experience and cozy life sim. Act as a 3D capsule toy collector and mystery box unlocker in this virtual gacha pull simulator and night shift management simulator natively running in the browser."
    />
    <meta
      name="keywords"
      content="gacha, capsule toy, 3D browser game, cozy life sim, night shift management simulator, virtual gacha pull simulator, mystery box unlocker, aesthetic neon webgl experience, three.js, browser aesthetic game"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/global.css" />
  </head>
  <body>
    <!-- Three.js canvas will be inserted here by Game.ts -->
    <div id="canvas-container"></div>

    <!-- All HTML/CSS UI overlays mount here -->
    <div id="ui-root"></div>

    <!-- Loading screen (visible before JS loads) -->
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-capsule">
          <div class="capsule-top"></div>
          <div class="capsule-bottom"></div>
        </div>
        <h1 class="loading-title">Catchapon</h1>
        <p class="loading-subtitle">Night Shift Gacha</p>
        <div class="loading-bar">
          <div class="loading-bar-fill"></div>
        </div>
        <p class="loading-tip">Maintain the machines. Pull the prizes. Build your collection.</p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
